<!-- Página do Carrinho de Compras do e-commerce Digital Store -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho - Digital Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <!-- Link para o arquivo de estilos CSS global -->
    <link rel="stylesheet" href="../css/cart.css">
    <link rel="stylesheet" href="../css/Homepage.css">
    <link rel="stylesheet" href="../css/auth-modal.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <!-- Cabeçalho dinâmico da página (renderizado via JavaScript) -->
    <header id="main-header">
        
    </header>
    <!-- Conteúdo principal da página -->
    <main id="main-content">
        <!-- Container principal da página do carrinho -->
        <section class="cart-page-container" style="max-width: 1200px; margin: 40px auto; padding: 0 20px;">
            <h2 style="margin-bottom: 30px;">Seu Carrinho</h2>
            <!-- Lista dinâmica de itens do carrinho (renderizado via JavaScript) -->
            <div id="cart-items-list"></div>
            <!-- Resumo do carrinho com total e botão de checkout (renderizado via JavaScript) -->
            <div id="cart-summary"></div>
        </section>
    </main>
    <!-- Rodapé dinâmico da página (renderizado via JavaScript) -->
    <footer id="main-footer"></footer>
    <!-- Script principal da aplicação usando ES Modules -->
    <script type="module" src="../js/app.js"></script>
    
    <!-- Script específico da página Cart usando ES Modules -->
    <script type="module" src="../js/page/CartPage.js"></script>
</body>
</html>
